<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ mi galería de pixel art ✦</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<!-- aplica tema antes del render para evitar flash y reflows tardíos -->
<script>if(localStorage.getItem('darkMode')==='1')document.documentElement.classList.add('dark-pre');</script>
<style>
:root {
  --bg:        #ede9e0;
  --bg2:       #e4dfd3;
  --bg3:       #d8d2c4;
  --win-bg:    #f5f2eb;
  --border:    #b0a688;
  --border-dk: #8c7f60;
  --title-c:   #5c5036;
  --text:      #38301f;
  --muted:     #8a7d62;
  --accent:    #c4916a;
  --warm:      #c4845a;
  --dark-mode: 0;
}

body.dark {
  --bg:        #1e1a14;
  --bg2:       #2a2418;
  --bg3:       #1a1510;
  --win-bg:    #242018;
  --border:    #4a3e28;
  --border-dk: #6a5a3a;
  --title-c:   #c8b890;
  --text:      #e8dfc8;
  --muted:     #8a7d62;
  --accent:    #c4916a;
  --warm:      #c4845a;
}
html.dark-pre body {
  --bg:        #1e1a14;
  --bg2:       #2a2418;
  --bg3:       #1a1510;
  --win-bg:    #242018;
  --border:    #4a3e28;
  --border-dk: #6a5a3a;
  --title-c:   #c8b890;
  --text:      #e8dfc8;
  --muted:     #8a7d62;
  --accent:    #c4916a;
  --warm:      #c4845a;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  background-image: url("data:image/svg+xml,%3Csvg width='4' height='4' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='1' height='1' fill='%23b0a688' fill-opacity='0.2'/%3E%3C/svg%3E");
  font-family: 'DM Mono', monospace;
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: background-color 0.6s ease, color 0.6s ease;
}

/* ── DARK MODE BULB ─── */
#bulb-wrap {
  position: fixed;
  top: 0;
  left: 32px;
  z-index: 200;
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  user-select: none;
}
.bulb-cord {
  width: 2px;
  height: 28px;
  background: var(--border-dk);
  transition: background 0.4s;
}
.bulb-btn {
  width: 32px;
  height: 32px;
  background: var(--win-bg);
  border: 2px solid var(--border-dk);
  box-shadow: 2px 2px 0 var(--border-dk);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  transition: background 0.4s, transform 0.15s, box-shadow 0.15s;
  position: relative;
}
#bulb-wrap:hover .bulb-btn { transform: translateY(2px); box-shadow: 1px 1px 0 var(--border-dk); }
#bulb-wrap:active .bulb-btn { transform: translateY(3px); box-shadow: 0 0 0 var(--border-dk); }

body.dark .bulb-btn {
  background: #2a1e10;
  box-shadow: 2px 2px 0 #6a5a3a, 0 0 18px 6px rgba(255,200,80,0.35);
}
body.dark .bulb-cord { background: #6a5a3a; }

@keyframes cordSwing {
  0%   { transform: rotate(0deg); }
  20%  { transform: rotate(8deg); }
  40%  { transform: rotate(-6deg); }
  60%  { transform: rotate(4deg); }
  80%  { transform: rotate(-2deg); }
  100% { transform: rotate(0deg); }
}
#bulb-wrap.swinging { animation: cordSwing 0.6s ease; transform-origin: top center; }

/* ── CURTAIN OVERLAY ─── */
#curtain {
  position: fixed;
  left: 0; right: 0;
  height: 100vh;
  background: linear-gradient(to bottom, #1a1510 0%, #2a1e14 100%);
  z-index: 100;
  pointer-events: none;
  bottom: 0;
  transform: translateY(100%);
  transition: transform 0.65s cubic-bezier(0.76, 0, 0.24, 1);
}
#curtain.slide-up { transform: translateY(0%); pointer-events: all; }
#curtain.slide-done { transform: translateY(-100%); pointer-events: none; transition: none; }

/* ── SKY FLASH OVERLAY ─── */
#sky-flash {
  position: fixed;
  inset: 0;
  z-index: 200;
  pointer-events: none;
  opacity: 0;
  background: radial-gradient(ellipse at 50% 50%,
    #ffffff 0%, #fff8e8 25%, #ffd980 55%, #d4a020 80%, transparent 100%);
  transition: opacity 0.55s cubic-bezier(0.4, 0, 0.2, 1),
              transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  transform: scale(1);
}
#sky-flash.flash-go {
  opacity: 1;
  transform: scale(1);
  pointer-events: all;
}

/* ── GALLERY SECTION ─────────────────────── */
#section-gallery {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding-bottom: 0;
}

/* ── HEADER ─────────────────────────────── */
header {
  text-align: center;
  padding: 60px 20px 40px;
  opacity: 0;
  transform: translateY(-10px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}
header.hdr-entered { opacity: 1; transform: translateY(0); }

.hdeco {
  font-family: 'Silkscreen', monospace;
  font-size: 10px;
  letter-spacing: 6px;
  color: var(--muted);
  margin-bottom: 16px;
  transition: color 0.6s;
}

h1 {
  font-family: 'Silkscreen', monospace;
  font-size: clamp(26px, 5vw, 44px);
  line-height: 1.4;
  letter-spacing: 2px;
  transition: color 0.6s;
}
h1 em { color: var(--accent); font-style: normal; }

.hint {
  margin-top: 14px;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--muted);
  transition: color 0.6s;
}
.rule { width: 56px; height: 2px; background: var(--border); margin: 22px auto 0; transition: background 0.6s; }

/* ── NAV BAR IN HEADER ─────────────────── */
.header-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  margin-top: 22px;
}

.nav-item {
  font-family: 'Silkscreen', monospace;
  font-size: 12px;
  letter-spacing: 2px;
  color: var(--muted);
  padding: 8px 16px;
  cursor: pointer;
  position: relative;
  transition: color 0.2s, font-size 0.2s, transform 0.2s;
  user-select: none;
  border-bottom: 2px solid transparent;
  display: inline-block;
}
.nav-item:hover {
  color: var(--text);
  transform: translateY(4px);
  font-size: 13px;
  border-bottom-color: var(--accent);
}
.nav-item.nav-active {
  color: var(--text);
  border-bottom-color: var(--accent);
}
.nav-sep {
  color: var(--border-dk);
  font-family: 'Silkscreen', monospace;
  font-size: 12px;
  user-select: none;
}

.nav-item.nav-pixelart:hover {
  color: var(--accent);
  text-shadow: 0 0 8px rgba(196,145,106,0.6), 0 0 20px rgba(196,145,106,0.3);
}

.nav-item.nav-music {
  position: relative;
  overflow: visible;
}
.music-note {
  position: absolute;
  font-size: 14px;
  pointer-events: none;
  animation: noteFloat 1.1s ease-out forwards;
  z-index: 10;
  line-height: 1;
}
@keyframes noteFloat {
  0%   { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
  100% { opacity: 0; transform: translateY(-42px) rotate(20deg) scale(0.7); }
}

/* ── GRID ────────────────────────────────── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
  gap: 64px 48px;
  max-width: 1040px;
  margin: 0 auto;
  padding: 48px 40px;
}

/* ── WINDOWS ─────────────────────────────── */
.win-wrap {
  position: relative;
  cursor: pointer;
  overflow: visible;
  border-radius: 2px;
  opacity: 0;
  transform: scale(0.88) translateY(12px);
  transition:
    opacity   0.45s cubic-bezier(0.34, 1.3, 0.64, 1),
    transform 0.45s cubic-bezier(0.34, 1.3, 0.64, 1);
}
.win-wrap.win-entered  { opacity: 1; transform: scale(1) translateY(0); }
.win-wrap.win-exit {
  opacity: 0 !important;
  transform: scale(0.97) translateY(-60px) !important;
  transition:
    opacity   0.5s cubic-bezier(0.4, 0, 0.6, 1),
    transform 0.5s cubic-bezier(0.4, 0, 0.6, 1) !important;
}
.win-wrap.win-exit-right {
  opacity: 0 !important;
  transform: scale(0.97) translateX(60px) !important;
  transition:
    opacity   0.5s cubic-bezier(0.4, 0, 0.6, 1),
    transform 0.5s cubic-bezier(0.4, 0, 0.6, 1) !important;
}
.win-wrap.win-enter-below {
  opacity: 0;
  transform: scale(0.97) translateY(60px);
}
.win-wrap.win-enter-right {
  opacity: 0;
  transform: scale(0.97) translateX(-60px);
}

.win-box {
  border: 2px solid var(--border-dk);
  background: var(--win-bg);
  box-shadow: 6px 6px 0 var(--border-dk);
  transition: box-shadow 0.25s, border-color 0.25s, background 0.6s;
}
.win-wrap:hover .win-box {
  box-shadow: 6px 6px 0 var(--title-c);
  border-color: var(--title-c);
}
.win-bar {
  background: var(--bg3);
  border-bottom: 2px solid var(--border-dk);
  height: 10px;
  transition: background 0.4s;
}
.win-wrap:hover .win-bar { background: var(--bg2); }

.win-screen {
  position: relative;
  aspect-ratio: 1 / 1;
  width: 100%;
  overflow: hidden;
}
.win-screen::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(20,16,10,0.38);
  z-index: 2;
  transition: opacity 0.5s;
  pointer-events: none;
}
.win-wrap:hover .win-screen::before { opacity: 0; }
.win-screen::after {
  content: 'z z z';
  position: absolute;
  top: 16px; right: 18px;
  font-family: 'Silkscreen', monospace;
  font-size: 11px;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.55);
  z-index: 3;
  transition: opacity 0.4s;
  pointer-events: none;
}
.win-wrap:hover .win-screen::after { opacity: 0; }

/* magic light on hover */
.win-magic-light {
  position: absolute;
  inset: -20%;
  background: radial-gradient(ellipse at 50% 60%, rgba(255,210,140,0.22) 0%, rgba(255,160,80,0.10) 40%, transparent 70%);
  z-index: 0;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.55s ease;
  animation: lightPulse 2.5s ease-in-out infinite;
}
.win-wrap:hover .win-magic-light { opacity: 1; }
@keyframes lightPulse {
  0%,100% { transform: scale(1); }
  50%      { transform: scale(1.06); }
}

.bg-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  display: block;
  image-rendering: pixelated;
  z-index: 1;
}
.anim-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  display: block;
  image-rendering: pixelated;
  z-index: 2;
  opacity: 0;
  transition: opacity 0.35s;
  pointer-events: none;
}
.win-wrap:hover .anim-canvas { opacity: 1; }

/* fx-canvas: partículas encima de todo */
.fx-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  display: block;
  z-index: 4;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.5s ease;
}
.win-wrap:hover .fx-canvas { opacity: 1; }

/* film strip overlay para "varios" */
.film-strip {
  position: absolute; inset: 0;
  z-index: 5;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.4s ease;
  overflow: hidden;
}
.win-wrap:hover .film-strip { opacity: 1; }
.film-strip::before,
.film-strip::after {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  width: 26px;
  background: repeating-linear-gradient(
    to bottom,
    #0d0a06 0px,   #0d0a06 5px,
    transparent    5px,  transparent 10px,
    #0d0a06 10px,  #0d0a06 15px,
    transparent    15px, transparent 20px
  );
}
.film-strip::before { left: 0;  border-right: 2px solid #3a2a10; }
.film-strip::after  { right: 0; border-left:  2px solid #3a2a10; }
.film-strip .scan {
  position: absolute;
  left: 0; right: 0;
  height: 3px;
  background: linear-gradient(to right, transparent, rgba(255,220,150,0.22), transparent);
  animation: scanSweep 2.4s linear infinite;
  pointer-events: none;
}
@keyframes scanSweep {
  0%   { top: -4px; opacity: 0.8; }
  80%  { opacity: 0.8; }
  100% { top: 100%; opacity: 0; }
}
.film-strip .scratch {
  position: absolute;
  width: 1px;
  background: rgba(255,230,160,0.25);
  animation: scratchFlicker 0.15s step-end infinite;
}
@keyframes scratchFlicker {
  0%,100% { opacity: 0; }
  50%      { opacity: 1; }
}

.win-label {
  font-family: 'Silkscreen', monospace;
  font-size: 13px;
  letter-spacing: 2px;
  color: var(--muted);
  text-align: center;
  margin-top: 12px;
  transition: color 0.3s;
}
.win-wrap:hover .win-label { color: var(--text); }

/* ── MAIN FOOTER BAR ─────────────────────── */
#main-footer {
  background: var(--bg3);
  border-top: 2px solid var(--border-dk);
  padding: 22px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  flex-wrap: wrap;
  flex-shrink: 0;
  transition: background 0.6s, border-color 0.6s;
}
.footer-copy {
  font-family: 'Silkscreen', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--title-c);
  line-height: 1.8;
  transition: color 0.6s;
}
.footer-copy span { color: var(--accent); }
.footer-copy a { color: var(--accent); text-decoration: none; }
.footer-copy a:hover { text-decoration: underline; }

.btn-about {
  font-family: 'Silkscreen', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--win-bg);
  background: var(--warm);
  border: 2px solid #9e5e30;
  box-shadow: 3px 3px 0 #9e5e30;
  padding: 10px 20px;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
  white-space: nowrap;
  user-select: none;
}
.btn-about:hover {
  background: #d4956a;
  transform: translateY(-1px);
  box-shadow: 3px 4px 0 #9e5e30;
}
.btn-about:active {
  transform: translateY(1px);
  box-shadow: 1px 1px 0 #9e5e30;
}

/* sky window — zoom in on click */
#win-sky { transform-origin: center center; }
#win-sky.sky-zoom {
  transform: scale(1.08) !important;
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1) !important;
  z-index: 10;
}

#leaf-intro {
  position: fixed;
  inset: 0;
  z-index: 500;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s ease;
}
#leaf-intro.active {
  opacity: 1;
  pointer-events: all;
}
#leaf-intro canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}
#leaf-intro-bg {
  background: #16121e;
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.6s ease;
}
#leaf-intro.filling #leaf-intro-bg { opacity: 1; }

/* ── SUB-PROYECTOS overlay ── */
#sub-overlay {
  position: fixed;
  inset: 0;
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s ease;
}
#sub-overlay.sub-visible {
  opacity: 1;
  pointer-events: all;
}
#sub-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(10, 8, 4, 0.82);
  cursor: pointer;
}
#sub-projects {
  position: relative;
  z-index: 1;
  display: flex;
  gap: clamp(16px, 4vw, 48px);
  justify-content: center;
  align-items: flex-start;
  padding: 16px;
  flex-wrap: wrap;
}
.sub-win {
  flex: 0 0 auto;
  width: clamp(180px, 36vw, 300px);
  opacity: 0;
  transform: scale(0.82) translateY(24px);
  transition:
    opacity   0.4s cubic-bezier(0.34, 1.3, 0.64, 1),
    transform 0.4s cubic-bezier(0.34, 1.3, 0.64, 1);
}
.sub-win.sub-entered { opacity: 1; transform: scale(1) translateY(0); }

/* personaje PNG que sobresale del cuadro */
.char-img {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%) translateY(18%);
  height: 115%;
  width: auto;
  z-index: 6;
  pointer-events: none;
  image-rendering: pixelated;
  transition: transform 0.35s cubic-bezier(0.34, 1.2, 0.64, 1);
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
}
.win-wrap:hover .char-img {
  transform: translateX(-50%) translateY(12%) scale(1.04);
}

/* zoom leve al click en proyectos */
#win-game { transform-origin: center center; }
#win-game.game-zoom {
  transform: scale(1.06) !important;
  transition: transform 0.35s cubic-bezier(0.34, 1.1, 0.64, 1) !important;
  z-index: 10;
}

@media (max-width: 600px) {
  .sub-win { width: clamp(140px, 44vw, 220px); }
  #sub-projects { gap: 12px; }
  #main-footer { flex-direction: column; align-items: flex-start; }
  .header-nav { flex-wrap: wrap; gap: 2px; }
}
</style>
</head>
<body>

<!-- dark mode bulb -->
<div id="bulb-wrap" title="Cambiar tema">
  <div class="bulb-cord"></div>
  <div class="bulb-btn" id="bulb-btn">💡</div>
</div>

<!-- curtain overlay -->
<div id="sky-flash"></div>
<div id="curtain"></div>

<!-- leaf intro overlay (mi proyecto) -->
<div id="leaf-intro">
  <div id="leaf-intro-bg"></div>
  <canvas id="leaf-intro-canvas"></canvas>
</div>

<!-- SUB-PROYECTOS overlay (aparece sobre todo al click en "proyectos") -->
<div id="sub-overlay">
  <div id="sub-backdrop"></div>
  <div id="sub-projects">
    <!-- MI PROYECTO -->
    <div class="win-wrap sub-win" id="win-miproyecto">
      <div class="win-magic-light"></div>
      <div class="win-box">
        <div class="win-bar"></div>
        <div class="win-screen">
          <canvas class="bg-canvas" id="bg-miproyecto"></canvas>
          <canvas class="fx-canvas" id="fx-miproyecto"></canvas>
          <img class="char-img" id="char-miproyecto" src="char-miproyecto.png" alt="Mi Proyecto" onerror="this.style.display='none'">
        </div>
      </div>
      <p class="win-label">mi proyecto</p>
    </div>
    <!-- HASTA MORALIS -->
    <div class="win-wrap sub-win" id="win-moralis">
      <div class="win-magic-light"></div>
      <div class="win-box">
        <div class="win-bar"></div>
        <div class="win-screen">
          <canvas class="bg-canvas" id="bg-moralis"></canvas>
          <canvas class="fx-canvas" id="fx-moralis"></canvas>
          <img class="char-img" id="char-moralis" src="char-moralis.png" alt="Hasta Moralis" onerror="this.style.display='none'">
        </div>
      </div>
      <p class="win-label">hasta moralis</p>
    </div>
  </div>
</div>

<!-- ══ GALLERY SECTION ══ -->
<section id="section-gallery">

  <header>
    <div class="hdeco">✦ &nbsp; neocities &nbsp; ✦</div>
    <h1>mi galería de<br><em>pixel art</em></h1>
    <p class="hint">pasa el cursor para despertar las ventanas</p>
    <div class="rule"></div>

    <!-- NAV -->
    <nav class="header-nav">
      <span class="nav-item nav-active nav-pixelart" data-section="gallery">pixel art</span>
      <span class="nav-sep">·</span>
      <span class="nav-item nav-music" id="nav-music" data-section="music">música</span>
      <span class="nav-sep">·</span>
      <span class="nav-item" id="nav-about" data-section="about">about me</span>
    </nav>
  </header>

  <div style="max-width:1040px;margin:0 auto;padding:0 40px 4px;">
    <p class="stag">— categorías —</p>
  </div>

  <div class="grid">

    <!-- SKY -->
    <div class="win-wrap" id="win-sky">
      <div class="win-magic-light"></div>
      <div class="win-box">
        <div class="win-bar"></div>
        <div class="win-screen">
          <canvas class="bg-canvas" id="bg-sky"></canvas>
          <canvas class="anim-canvas" id="anim-sky"></canvas>
          <canvas class="fx-canvas" id="fx-sky"></canvas>
        </div>
      </div>
      <p class="win-label">sky</p>
    </div>

    <!-- PROYECTOS -->
    <div class="win-wrap" id="win-game">
      <div class="win-magic-light"></div>
      <div class="win-box">
        <div class="win-bar"></div>
        <div class="win-screen">
          <canvas class="bg-canvas" id="bg-game"></canvas>
          <canvas class="anim-canvas" id="anim-game"></canvas>
          <canvas class="fx-canvas" id="fx-game"></canvas>
        </div>
      </div>
      <p class="win-label">proyectos</p>
    </div>

    <!-- FANART -->
    <div class="win-wrap" id="win-vid">
      <div class="win-magic-light"></div>
      <div class="win-box">

<script>
/* ════════════════════════════════════════
   DARK MODE
════════════════════════════════════════ */
const bulbWrap = document.getElementById('bulb-wrap');

/* ════════════════════════════════════════
   MUSIC NAV — floating notes
════════════════════════════════════════ */
const navMusic = document.getElementById('nav-music');
const NOTES = ['♩','♪','♫','♬','𝅘𝅥𝅮'];
let noteInterval = null;

function spawnNote() {
  const note = document.createElement('span');
  note.className = 'music-note';
  note.textContent = NOTES[Math.floor(Math.random() * NOTES.length)];
  const offsetX = Math.random() * 60 - 10;

  note.style.bottom = '100%';

navMusic.addEventListener('mouseenter', () => {
  spawnNote();

navMusic.addEventListener('mouseleave', () => {
  clearInterval(noteInterval);
  noteInterval = null;
});

/* ════════════════════════════════════════
   GIF LOADER + WINDOW ANIMATION SYSTEM
════════════════════════════════════════ */
let gifuctReady = null;
function loadGifuct() {
  if (gifuctReady) return gifuctReady;
  gifuctReady = new Promise(resolve => {
    if (window.parseGIF) { resolve(); return; }
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/gifuct-js@2.1.2/dist/gifuct-js.min.js';
    s.onload = () => resolve();
    document.head.appendChild(s);
  });
  return gifuctReady;
}

class WinAnim {
  constructor({ wrapId, animId, gifSrc, fps = 12 }) {
    this.wrap     = document.getElementById(wrapId);
    this.canvas   = document.getElementById(animId);
    this.ctx      = this.canvas.getContext('2d');
    this.gifSrc   = gifSrc;
    this.fps      = fps;
    this.frameDur = 1000 / fps;
    this.frames   = [];
    this.loaded   = false;
    this.loading  = false;
    this.frameIdx = 0;
    this.direction= 1;
    this.rafId    = null;
    this.lastTime = 0;
    this.playing  = false;
    this._bindEvents();
  }
  _bindEvents() {
    this.wrap.addEventListener('mouseenter', () => this._startPlay(1));
    this.wrap.addEventListener('mouseleave', () => this._startPlay(-1));
  }
  _startPlay(dir) {
    this.direction = dir;
    if (!this.gifSrc) return;
    if (!this.loaded) { this._load().then(() => { if (this.direction === dir) this._play(); }); return; }
    this._play();
  }
  _play() {
    if (this.rafId) { cancelAnimationFrame(this.rafId); this.rafId = null; }
    this.playing = true; this.lastTime = 0;
    const tick = ts => {
      if (!this.playing) return;
      if (!this.lastTime) this.lastTime = ts;
      if (ts - this.lastTime >= this.frameDur) {
        this.lastTime = ts;
        this._drawFrame(this.frameIdx);
        this.frameIdx += this.direction;
        if (this.frameIdx >= this.frames.length) { this.frameIdx = this.frames.length - 1; this.playing = false; return; }
        if (this.frameIdx < 0) { this.frameIdx = 0; this.playing = false; this._clearCanvas(); return; }
      }
      this.rafId = requestAnimationFrame(tick);
    };
    this.rafId = requestAnimationFrame(tick);
  }
  _drawFrame(idx) {
    if (!this.frames[idx]) return;
    const { imageData, dims } = this.frames[idx];
    const off = new OffscreenCanvas(dims.width, dims.height);
    off.getContext('2d').putImageData(imageData, 0, 0);
    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
    this.ctx.drawImage(off, 0, 0, this.canvas.width, this.canvas.height);
  }
  _clearCanvas() { this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height); }
  async _load() {
    if (this.loaded || this.loading) return;
    this.loading = true;
    await loadGifuct();
    try {
      const buf = await (await fetch(this.gifSrc)).arrayBuffer();
      const gif = window.parseGIF(buf);
      const raw = window.decompressFrames(gif, true);
      const w = gif.lsd.width, h = gif.lsd.height;
      const prev = new OffscreenCanvas(w, h), prevCtx = prev.getContext('2d');
      for (const f of raw) {
        const fc = new OffscreenCanvas(w, h), fCtx = fc.getContext('2d');
        fCtx.drawImage(prev, 0, 0);
        const tmp = new OffscreenCanvas(f.dims.width, f.dims.height);
        tmp.getContext('2d').putImageData(new ImageData(new Uint8ClampedArray(f.patch), f.dims.width, f.dims.height), 0, 0);
        fCtx.drawImage(tmp, f.dims.left, f.dims.top);
        this.frames.push({ imageData: fCtx.getImageData(0, 0, w, h), dims: { width: w, height: h } });
        if (f.disposalType === 2) prevCtx.clearRect(f.dims.left, f.dims.top, f.dims.width, f.dims.height);
        else prevCtx.drawImage(fc, 0, 0);
      }
      this.loaded = true;
    } catch(e) { console.warn('GIF error:', this.gifSrc, e); }
    this.loading = false;
  }
  syncSize() {
    const w = this.canvas.offsetWidth, h = this.canvas.offsetHeight;
    if (w && h) { this.canvas.width = w; this.canvas.height = h; }
  }
}

/* ════════════════════════════════════════
   BACKGROUND PAINTERS
════════════════════════════════════════ */
const S = 3;

function drawSkyBg(c) {
  const ctx = c.getContext('2d'), W = c.width, H = c.height;
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0d1a2e'); g.addColorStop(0.6,'#1a2a45'); g.addColorStop(1,'#2a3a55');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = '#ffffffaa';
  [[20,15],[45,8],[80,22],[110,6],[140,18],[170,10],[200,25],[30,40],[60,35],[100,48],[150,32],[185,44],[210,15],[240,38]]
    .forEach(([x,y]) => ctx.fillRect(x%W, y%(H/2), S-1, S-1));
  ctx.fillStyle='#e8dfc0'; ctx.fillRect(W-60,20,S*6,S*6);
  ctx.fillStyle='#1a2a45'; ctx.fillRect(W-54,20,S*4,S*4);
  ctx.fillStyle='#0d1220'; ctx.fillRect(0,H*0.72,W,H);
  [[20,H*0.6],[80,H*0.55],[200,H*0.58],[280,H*0.62]].forEach(([x,y]) => {
    ctx.fillStyle='#0a0f1a'; ctx.fillRect(x,y,S*2,H*0.72-y); ctx.fillRect(x-S*3,y-S*4,S*8,S*6);
  });
}

function drawGameBg(c) {
  const ctx = c.getContext('2d'), W = c.width, H = c.height;
  ctx.fillStyle='#16121e'; ctx.fillRect(0,0,W,H);
  for(let r=0;r<Math.ceil(H/(S*6));r++) for(let col=0;col<Math.ceil(W/(S*8));col++) {
    ctx.strokeStyle='rgba(80,60,100,0.25)'; ctx.lineWidth=1;
    ctx.strokeRect(col*S*8+(r%2)*S*4, r*S*6, S*8, S*6);
  }
  [[30,H*0.3],[W-50,H*0.4],[W/2,H*0.2]].forEach(([x,y]) => {
    ctx.fillStyle='#3a2810'; ctx.fillRect(x,y,S*2,S*4);
    ctx.fillStyle='#4a3010'; ctx.fillRect(x-S,y-S*2,S*4,S*3);
    ctx.fillStyle='rgba(180,90,20,0.12)'; ctx.fillRect(x-S*4,y-S*4,S*10,S*8);
  });
  ctx.fillStyle='#0e0b14'; ctx.fillRect(W/2-S*5,H*0.55,S*10,H*0.45);
  ctx.strokeStyle='#2a2040'; ctx.lineWidth=2; ctx.strokeRect(W/2-S*5,H*0.55,S*10,H*0.45);
}

/* Fondo Mi Proyecto — bosque otoñal pixel */
function drawMiProyectoBg(c) {
  const ctx = c.getContext('2d'), W = c.width, H = c.height;
  // cielo crepuscular
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#1a0e06'); g.addColorStop(0.5,'#3a1a08'); g.addColorStop(1,'#1e1208');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // suelo
  ctx.fillStyle='#0e0a04'; ctx.fillRect(0,H*0.72,W,H*0.28);
  // árboles pixel
  const trees = [[W*0.1,H*0.5],[W*0.3,H*0.42],[W*0.6,H*0.48],[W*0.82,H*0.44]];
  trees.forEach(([tx,ty]) => {
    const tw = S*3, th = H*0.72-ty;
    ctx.fillStyle='#2a1a08'; ctx.fillRect(tx-tw/2, ty, tw, th);
    // copa
    ctx.fillStyle='#6a2a08';
    ctx.fillRect(tx-S*5, ty-S*4, S*10, S*5);
    ctx.fillRect(tx-S*3, ty-S*8, S*6, S*5);
    ctx.fillStyle='#c4521a';
    ctx.fillRect(tx-S*4, ty-S*3, S*2, S*2);
    ctx.fillRect(tx+S*2, ty-S*6, S*2, S*2);
    ctx.fillRect(tx-S,   ty-S*7, S*2, S*2);
  });
  // luna
  ctx.fillStyle='#f0e0b0'; ctx.fillRect(W*0.75,H*0.08,S*4,S*4);
  ctx.fillStyle='#1a0e06'; ctx.fillRect(W*0.75+S,H*0.08,S*3,S*3);
}

/* Fondo Hasta Moralis — ciudad futurista / neon */
function drawMoralisBg(c) {
  const ctx = c.getContext('2d'), W = c.width, H = c.height;
  // fondo oscuro
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#050818'); g.addColorStop(0.7,'#08102a'); g.addColorStop(1,'#020508');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // grid perspectiva suelo
  ctx.strokeStyle='rgba(0,200,255,0.12)'; ctx.lineWidth=1;
  const gy = H*0.68;
  for(let i=0;i<=10;i++) {
    const x = (W/10)*i;
    ctx.beginPath(); ctx.moveTo(x,gy); ctx.lineTo(W/2, H*0.35); ctx.stroke();
  }
  for(let i=0;i<=6;i++) {
    const t = i/6;
    const y = gy + (H - gy)*t;
    const lx = W/2 - (W/2)*(t*0.9+0.1);
    const rx = W/2 + (W/2)*(t*0.9+0.1);
    ctx.beginPath(); ctx.moveTo(lx,y); ctx.lineTo(rx,y); ctx.stroke();
  }
  // edificios silueta
  const blds=[
    [W*0.0,H*0.3,W*0.12,H*0.38,'#0a0f20'],
    [W*0.10,H*0.2,W*0.10,H*0.48,'#080d1c'],
    [W*0.78,H*0.25,W*0.10,H*0.43,'#080d1c'],
    [W*0.86,H*0.35,W*0.14,H*0.33,'#0a0f20'],
  ];
  blds.forEach(([bx,by,bw,bh,bc]) => {
    ctx.fillStyle=bc; ctx.fillRect(bx,by,bw,bh);
    // ventanas neon
    for(let r=0;r<3;r++) for(let col=0;col<2;col++) {
      if(Math.random()<0.5) continue;
      const wx=bx+S*1.5+col*S*3, wy=by+S*2+r*S*4;
      ctx.fillStyle=`rgba(0,${150+Math.random()*100|0},255,0.6)`;
      ctx.fillRect(wx,wy,S*1.5,S*2);
    }
  });
  // estrellas
  ctx.fillStyle='rgba(180,220,255,0.7)';
  [[W*0.15,H*0.06],[W*0.35,H*0.10],[W*0.55,H*0.04],[W*0.70,H*0.12],[W*0.88,H*0.07],[W*0.45,H*0.16]].forEach(([sx,sy])=>{
    ctx.fillRect(sx,sy,S*0.7,S*0.7);
  });
  // luna holográfica
  ctx.strokeStyle='rgba(0,200,255,0.5)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(W*0.5,H*0.18,S*5,0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle='rgba(0,200,255,0.2)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(W*0.5,H*0.18,S*7,0,Math.PI*2); ctx.stroke();
}

function drawVidBg(c) {
  const ctx = c.getContext('2d'), W = c.width, H = c.height;
  const g = ctx.createLinearGradient(0,0,0,H*0.6);
  g.addColorStop(0,'#2a1a30'); g.addColorStop(0.5,'#4a2a20'); g.addColorStop(1,'#6a3a25');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H*0.65);
  ctx.fillStyle='#2a3820'; ctx.fillRect(0,H*0.65,W,S*4);
  ctx.fillStyle='#3a2a18'; ctx.fillRect(0,H*0.65+S*4,W,S*6);
  ctx.fillStyle='#2a1e10'; ctx.fillRect(0,H*0.65+S*10,W,H);
  ctx.fillStyle='#1a1008'; ctx.fillRect(S*8,H*0.38,S*3,H*0.27);
  ctx.fillStyle='#1e2a10'; ctx.fillRect(S*4,H*0.2,S*11,H*0.22);
  ctx.fillStyle='#3a3020'; ctx.fillRect(W-S*10,S*4,S*7,S*7);
  ctx.strokeStyle='#4a4030'; ctx.lineWidth=1.5; ctx.strokeRect(W-S*10,S*4,S*7,S*7);
  [[60,H*0.8],[120,H*0.85],[200,H*0.78],[250,H*0.88]].forEach(([x,y]) => { ctx.fillStyle='#204060'; ctx.fillRect(x,y,S*2,S*2); });
}

function drawAnimBg(c) {
  const ctx = c.getContext('2d'), W = c.width, H = c.height;
  ctx.fillStyle='#111008'; ctx.fillRect(0,0,W,H);
  for(let x=S*4;x<W-S*4;x+=S*8) {
    ctx.fillStyle='#2a2418'; ctx.fillRect(x,S*2,S*4,S*3); ctx.fillRect(x,H-S*5,S*4,S*3);
  }
  const fw=(W-S*4)/3;
  for(let i=0;i<3;i++) {
    const fx=S*2+i*fw;
    ctx.fillStyle='#1e1a10'; ctx.fillRect(fx+S,S*7,fw-S*2,H-S*14);
    ctx.strokeStyle='#3a3020'; ctx.lineWidth=1; ctx.strokeRect(fx+S,S*7,fw-S*2,H-S*14);
    const sfx=fx+fw/2, sfy=S*10;
    ctx.fillStyle='#2a2418';
    ctx.fillRect(sfx-S,sfy,S*2,S*2); ctx.fillRect(sfx-S,sfy+S*2,S*2,S*3);
    ctx.fillRect(sfx-S*3,sfy+S*2,S*2,S*2); ctx.fillRect(sfx+S,sfy+S*2,S*2,S*2);
    ctx.fillRect(sfx-S,sfy+S*5,S,S*3); ctx.fillRect(sfx,sfy+S*5,S,S*3);
  }
}

/* ════════════════════════════════════════
   SETUP
════════════════════════════════════════ */
const WINDOWS = [
  { wrapId:'win-sky',  bgId:'bg-sky',  animId:'anim-sky',  bgDraw:drawSkyBg,  gifSrc:null, fps:12 },
  { wrapId:'win-game', bgId:'bg-game', animId:'anim-game', bgDraw:drawGameBg, gifSrc:null, fps:12 },
  { wrapId:'win-vid',  bgId:'bg-vid',  animId:'anim-vid',  bgDraw:drawVidBg,  gifSrc:null, fps:12 },
  { wrapId:'win-anim', bgId:'bg-anim', animId:'anim-anim', bgDraw:drawAnimBg, gifSrc:null, fps:12 },
];
const SUB_WINDOWS = [
  { bgId:'bg-miproyecto', bgDraw:drawMiProyectoBg },
  { bgId:'bg-moralis',    bgDraw:drawMoralisBg    },
];
const controllers = [];

function initAll() {
  WINDOWS.forEach(cfg => {
    const bgC = document.getElementById(cfg.bgId);
    bgC.width  = bgC.offsetWidth  || bgC.parentElement.offsetWidth;
    bgC.height = bgC.offsetHeight || bgC.parentElement.offsetHeight;
    cfg.bgDraw(bgC);
    const ctrl = new WinAnim({ wrapId:cfg.wrapId, animId:cfg.animId, gifSrc:cfg.gifSrc, fps:cfg.fps });
    ctrl.syncSize();
    controllers.push(ctrl);
  });
}

function initSubWindows() {
  SUB_WINDOWS.forEach(cfg => {
    const bgC = document.getElementById(cfg.bgId);
    if (!bgC) return;
    bgC.width  = bgC.offsetWidth  || bgC.parentElement.offsetWidth || 300;
    bgC.height = bgC.offsetHeight || bgC.parentElement.offsetHeight || 300;
    cfg.bgDraw(bgC);
  });
}

/* ════════════════════════════════════════
   NAVIGATION
   Regla única: el curtain SIEMPRE se mueve
   con requestAnimationFrame doble para que
   el browser garantice dos frames distintos
   (frame 1 = posición inicial sin transición,
    frame 2 = posición final con transición).
   Nunca se tocan clases CSS en el curtain.
════════════════════════════════════════ */

const curtain  = document.getElementById('curtain');
const btnAbout = document.getElementById('btn-about');
const navAbout = document.getElementById('nav-about');

function wraps() { return document.querySelectorAll('.win-wrap'); }

/* Mueve el curtain desde `from` hasta `to` y navega.
   getBoundingClientRect() fuerza un reflow real entre los dos estados,
   garantizando que el browser los trate como frames separados incluso
   en iframes o contextos con throttling (como Neocities). */
function curtainGo(fromTransform, toTransform, href) {
  curtain.style.transition    = 'none';
  curtain.style.transform     = fromTransform;
  curtain.style.pointerEvents = 'all';
  curtain.getBoundingClientRect(); // 🔑 reflow forzado — separa los dos estados
  curtain.style.transition = 'transform 0.65s cubic-bezier(0.76, 0, 0.24, 1)';
  curtain.style.transform  = toTransform;
  setTimeout(() => { window.location.href = href; }, 720);
}

/* Revela el curtain al cargar: lo posiciona cubriendo la pantalla
   y lo desliza fuera. getBoundingClientRect() es el separador clave. */
function curtainReveal(coverTransform, exitTransform, onDone) {
  curtain.style.transition    = 'none';
  curtain.style.transform     = coverTransform;
  curtain.style.pointerEvents = 'all';
  curtain.getBoundingClientRect(); // 🔑 reflow forzado
  curtain.style.transition    = 'transform 0.65s cubic-bezier(0.76, 0, 0.24, 1)';
  curtain.style.transform     = exitTransform;
  curtain.style.pointerEvents = 'none';
  if (onDone) setTimeout(onDone, 400);
}

/* ── sky → zoom + flash de luz ── */
function goToSky() {
  const winSky = document.getElementById('win-sky');
  const flash  = document.getElementById('sky-flash');

  // 1. zoom in del cuadro
  winSky.classList.add('sky-zoom');

  // 2. flash se activa después de 150ms — esperar transitionend o timeout
  setTimeout(() => {
    flash.classList.add('flash-go');
    // 3. navegar cuando flash llegó a opaco (la transición dura 550ms)
    setTimeout(() => {
      sessionStorage.setItem('fromSky', '1');
      window.location.href = 'sky.html';
    }, 600);
  }, 150);
}
document.getElementById('win-sky').addEventListener('click', goToSky);

/* ── proyectos → overlay con sub-cuadros ── */
let projectsOpen = false;
function toggleProjects() {
  const winGame  = document.getElementById('win-game');
  const overlay  = document.getElementById('sub-overlay');

  if (projectsOpen) {
    closeProjects();
    return;
  }

  projectsOpen = true;

  // zoom leve del cuadro padre
  winGame.classList.add('game-zoom');
  setTimeout(() => winGame.classList.remove('game-zoom'), 420);

  // mostrar overlay
  overlay.classList.add('sub-visible');

  // inicializar fondos (primera vez) y animar entrada
  requestAnimationFrame(() => {
    initSubWindows();
    overlay.querySelectorAll('.sub-win').forEach((el, i) => {
      setTimeout(() => el.classList.add('sub-entered'), 80 + i * 130);
    });
    initMiProyectoFx();
    initMoralisFx();
  });
}

function closeProjects() {
  const overlay = document.getElementById('sub-overlay');
  overlay.querySelectorAll('.sub-win').forEach(el => el.classList.remove('sub-entered'));
  setTimeout(() => {
    overlay.classList.remove('sub-visible');
    projectsOpen = false;
  }, 320);
}

document.getElementById('win-game').addEventListener('click', toggleProjects);

// cerrar al click en el backdrop
document.getElementById('sub-backdrop').addEventListener('click', closeProjects);

// cerrar con Escape
document.addEventListener('keydown', e => { if (e.key === 'Escape' && projectsOpen) closeProjects(); });

/* ── mi proyecto sub → hojas cubren pantalla ── */
function goToMiProyecto() {
  const intro  = document.getElementById('leaf-intro');
  const canvas = document.getElementById('leaf-intro-canvas');
  intro.classList.add('active');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;

  const ctx = canvas.getContext('2d');
  const leaves = [];
  let raf = null, spawnCount = 0;

  const LEAF_COLORS = ['#c4521a','#d4701a','#b83a0a','#e8922a','#c4391a','#a83010','#d4602a','#9e6030','#8a3010','#e07020'];

  function spawnLeaf() {
    const W = canvas.width, H = canvas.height;
    const fromSide = Math.random() < 0.3;
    leaves.push({
      x:    fromSide ? (Math.random() < 0.5 ? -20 : W+20) : Math.random()*W,
      y:    fromSide ? Math.random()*H*0.5 : -20-Math.random()*60,
      size: 8 + Math.random()*20,
      vx:   (Math.random()-0.5)*3, vy: 3+Math.random()*5,
      rot:  Math.random()*Math.PI*2, vrot: (Math.random()-0.5)*0.15,
      sway: Math.random()*Math.PI*2, swayS: 0.03+Math.random()*0.05,
      color: LEAF_COLORS[Math.floor(Math.random()*LEAF_COLORS.length)], alpha:0,
    });
    spawnCount++;
  }
  function drawLeaf(x,y,size,rot,color,alpha) {
    ctx.save(); ctx.globalAlpha=alpha; ctx.translate(x,y); ctx.rotate(rot);
    ctx.fillStyle=color;
    const s=size;
    ctx.fillRect(-s*.5,-s,s,s*2); ctx.fillRect(-s,-s*.3,s*2,s*.6);
    ctx.fillRect(-s*.7,-s*.7,s*1.4,s*.4); ctx.fillRect(-s*.7,s*.3,s*1.4,s*.4);
    ctx.restore();
  }
  let coverStart=null, covered=false;
  function tick(ts) {
    raf=requestAnimationFrame(tick);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if (spawnCount<120 && Math.random()<(spawnCount<40?.95:.7)) spawnLeaf();
    for(let i=leaves.length-1;i>=0;i--) {
      const l=leaves[i];
      l.alpha=Math.min(1,l.alpha+0.06); l.sway+=l.swayS;
      l.x+=l.vx+Math.sin(l.sway)*1.2; l.y+=l.vy; l.rot+=l.vrot;
      if(l.y>canvas.height*.5) l.vy*=0.985;
      drawLeaf(l.x,l.y,l.size,l.rot,l.color,l.alpha);
    }
    if(!covered && spawnCount>=80 && !coverStart) coverStart=ts;
    if(coverStart && ts-coverStart>500 && !covered) {
      covered=true; intro.classList.add('filling');
      setTimeout(()=>{ cancelAnimationFrame(raf); sessionStorage.setItem('fromProject','1'); window.location.href='proyecto.html'; },700);
    }
  }
  setTimeout(()=>{ raf=requestAnimationFrame(tick); },60);
}

/* ── hasta moralis sub → glitch tech overlay ── */
function goToMoralis() {
  const intro  = document.getElementById('leaf-intro');
  const canvas = document.getElementById('leaf-intro-canvas');
  const bg     = document.getElementById('leaf-intro-bg');
  intro.classList.add('active');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;

  const ctx = canvas.getContext('2d');
  bg.style.background = '#020810';

  let raf = null, t = 0;

  // líneas de datos / scanlines / partículas tech
  const particles = [];
  const lines = [];

  function spawnLine() {
    lines.push({
      x: Math.random() * canvas.width,
      y: -10,
      w: 1 + Math.random() * 2,
      h: 20 + Math.random() * 80,
      vy: 4 + Math.random() * 8,
      color: Math.random() < 0.6 ? '#00c8ff' : Math.random() < 0.5 ? '#00ff88' : '#ff00aa',
      alpha: 0.4 + Math.random() * 0.6,
    });
  }
  function spawnParticle() {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x: canvas.width / 2 + (Math.random()-0.5)*canvas.width*0.6,
      y: canvas.height / 2 + (Math.random()-0.5)*canvas.height*0.6,
      vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
      size: 1+Math.random()*3, life:0, maxL:30+Math.random()*40,
      color: Math.random()<0.5?'#00c8ff':'#00ff88',
    });
  }

  let coverStart=null, covered=false;
  function tick(ts) {
    raf=requestAnimationFrame(tick);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    t++;

    // scanline sweep
    if(t%2===0) {
      const sy=(t*6)%canvas.height;
      ctx.fillStyle='rgba(0,200,255,0.04)';
      ctx.fillRect(0,sy,canvas.width,3);
    }

    // spawn
    if(Math.random()<0.4) spawnLine();
    if(Math.random()<0.5) spawnParticle();

    // draw lines
    for(let i=lines.length-1;i>=0;i--) {
      const l=lines[i]; l.y+=l.vy;
      ctx.globalAlpha=l.alpha;
      ctx.fillStyle=l.color;
      ctx.fillRect(l.x,l.y,l.w,l.h);
      if(l.y>canvas.height+10) lines.splice(i,1);
    }
    // draw particles
    for(let i=particles.length-1;i>=0;i--) {
      const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.life++;
      if(p.life>p.maxL){particles.splice(i,1);continue;}
      const a=(1-p.life/p.maxL)*0.8;
      ctx.globalAlpha=a; ctx.fillStyle=p.color;
      ctx.fillRect(Math.round(p.x),Math.round(p.y),p.size,p.size);
    }
    ctx.globalAlpha=1;

    // glitch flash ocasional
    if(t%18===0 && Math.random()<0.4) {
      ctx.fillStyle='rgba(0,200,255,0.06)';
      ctx.fillRect(0,0,canvas.width,canvas.height);
    }

    if(!covered && t>40 && !coverStart) coverStart=ts;
    if(coverStart && ts-coverStart>600 && !covered) {
      covered=true; intro.classList.add('filling');
      setTimeout(()=>{ cancelAnimationFrame(raf); sessionStorage.setItem('fromMoralis','1'); window.location.href='hastamoralis.html'; },700);
    }
  }
  setTimeout(()=>{ raf=requestAnimationFrame(tick); },60);
}

/* ════════════════════════════════════════
   PAGE LOAD
════════════════════════════════════════ */
let pageInitDone = false;

function runPageInit() {
  if (!pageInitDone) { initAll(); pageInitDone = true; }

  requestAnimationFrame(() => {
    document.querySelector('header').classList.add('hdr-entered');
  });

  const fromAbout   = sessionStorage.getItem('fromAbout');
  const fromMusic   = sessionStorage.getItem('fromMusic');
  const fromProject = sessionStorage.getItem('fromProject');
  const fromMoralis = sessionStorage.getItem('fromMoralis');

  function enterWindows(prepClass) {
    wraps().forEach(el => { if (prepClass) el.classList.add(prepClass); });
    setTimeout(() => {
      wraps().forEach((el, i) => {
        setTimeout(() => {
          if (prepClass) el.classList.remove(prepClass);
          el.classList.add('win-entered');
        }, i * 120);
      });
    }, 200);
  }

  if (fromAbout) {
    sessionStorage.removeItem('fromAbout');
    // curtain viene de arriba (about estaba arriba), sale hacia abajo
    curtainReveal('translateY(0%)', 'translateY(100%)');
    enterWindows('win-enter-below');

  } else if (fromProject || fromMoralis) {
    sessionStorage.removeItem('fromProject');
    sessionStorage.removeItem('fromMoralis');
    curtain.style.transition  = 'none';
    curtain.style.transform   = 'translateY(100%)';
    curtain.style.pointerEvents = 'none';
    enterWindows(null);

  } else if (sessionStorage.getItem('fromSky')) {
    sessionStorage.removeItem('fromSky');
    // Limpiar el flash overlay inmediatamente — venía cubierto de la animación de sky
    const flash = document.getElementById('sky-flash');
    flash.style.transition  = 'none';
    flash.style.opacity     = '0';
    flash.style.pointerEvents = 'none';
    flash.classList.remove('flash-go');
    // flash curtain ya cubrió la pantalla en sky.html — solo entramos windows
    curtain.style.transition = 'none';
    curtain.style.transform  = 'translateY(100%)';
    curtain.style.pointerEvents = 'none';
    enterWindows(null);

  } else if (fromMusic) {
    sessionStorage.removeItem('fromMusic');
    // curtain viene de la izquierda, sale hacia la izquierda
    curtainReveal('translateX(0%)', 'translateX(-100%)');
    enterWindows('win-enter-right');

  } else {
    // primera visita o recarga directa: sin curtain
    curtain.style.transition = 'none';
    curtain.style.transform  = 'translateY(100%)';
    curtain.style.pointerEvents = 'none';
    wraps().forEach((el, i) => {
      setTimeout(() => el.classList.add('win-entered'), 200 + i * 160);
    });
  }
}

window.addEventListener('load', runPageInit);
window.addEventListener('pageshow', e => { if (e.persisted) runPageInit(); });

/* ── utilidad: resize canvas fx ── */
function syncFx(id) {
  const c = document.getElementById(id);
  if (!c) return c;
  c.width  = c.offsetWidth  || c.parentElement.offsetWidth;
  c.height = c.offsetHeight || c.parentElement.offsetHeight;
  return c;
}

/* ══════════════════════════════
   SKY — luz brillante + partículas de luz flotantes
══════════════════════════════ */
(function() {
  const wrap = document.getElementById('win-sky');
  const c    = document.getElementById('fx-sky');
  if (!wrap || !c) return;

  const particles = [];
  let active = false, raf = null;

  function spawn() {
    const W = c.width, H = c.height;
    particles.push({
      x:     Math.random() * W,
      y:     Math.random() * H,
      r:     1 + Math.random() * 2.5,
      vx:    (Math.random() - 0.5) * 0.5,
      vy:    -0.4 - Math.random() * 0.8,
      life:  0,
      maxL:  60 + Math.random() * 80,
      hue:   35 + Math.random() * 30,  // dorado-ámbar
    });
  }

  function tick() {
    if (!active) { clearFx(c); return; }
    raf = requestAnimationFrame(tick);
    const ctx = c.getContext('2d');
    ctx.clearRect(0, 0, c.width, c.height);

    // brillo central
    const gx = c.width * 0.5, gy = c.height * 0.35;
    const gl = ctx.createRadialGradient(gx, gy, 0, gx, gy, c.width * 0.55);
    gl.addColorStop(0,   'rgba(255,220,120,0.22)');
    gl.addColorStop(0.4, 'rgba(220,170,60,0.09)');
    gl.addColorStop(1,   'transparent');
    ctx.fillStyle = gl;
    ctx.fillRect(0, 0, c.width, c.height);

    // spawn y dibuja partículas
    if (Math.random() < 0.35) spawn();
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.life++;
      if (p.life > p.maxL) { particles.splice(i, 1); continue; }
      const t   = p.life / p.maxL;
      const alpha = t < 0.3 ? t / 0.3 : 1 - (t - 0.3) / 0.7;
      const gp = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 3);
      gp.addColorStop(0,   `hsla(${p.hue},100%,95%,${alpha})`);
      gp.addColorStop(0.4, `hsla(${p.hue},80%,75%,${alpha * 0.5})`);
      gp.addColorStop(1,   'transparent');
      ctx.fillStyle = gp;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * 3, 0, Math.PI * 2);
      ctx.fill();
      // núcleo brillante
      ctx.fillStyle = `hsla(${p.hue},100%,98%,${alpha})`;
      ctx.fillRect(p.x - p.r * 0.5, p.y - p.r * 0.5, p.r, p.r);
    }
  }

  function clearFx(cv) {
    cv.getContext('2d').clearRect(0, 0, cv.width, cv.height);
    particles.length = 0;
  }

  wrap.addEventListener('mouseenter', () => {
    syncFx('fx-sky');
    active = true;
    if (!raf) tick();
  });
  wrap.addEventListener('mouseleave', () => {
    active = false;
    raf = null;
  });
})();

/* ══════════════════════════════
   MI PROYECTO — hojas otoñales cayendo
══════════════════════════════ */
(function() {
  const wrap = document.getElementById('win-game');
  const c    = document.getElementById('fx-game');
  if (!wrap || !c) return;

  const leaves = [];
  let active = false, raf = null;

  const LEAF_COLORS = [
    '#c4521a','#d4701a','#b83a0a','#e8922a',
    '#c4391a','#a83010','#d4602a','#9e6030',
  ];

  function spawnLeaf() {
    const W = c.width;
    leaves.push({
      x:    Math.random() * W,
      y:    -8,
      size: 4 + Math.random() * 5,
      vx:   (Math.random() - 0.5) * 1.2,
      vy:   0.8 + Math.random() * 1.2,
      rot:  Math.random() * Math.PI * 2,
      vrot: (Math.random() - 0.5) * 0.12,
      sway: Math.random() * Math.PI * 2,
      swayS: 0.04 + Math.random() * 0.04,
      color: LEAF_COLORS[Math.floor(Math.random() * LEAF_COLORS.length)],
    });
  }

  function drawLeaf(ctx, x, y, size, rot, color) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rot);
    ctx.fillStyle = color;
    // hoja pixel: rombo simple de 3x3 píxeles escalado
    const s = size;
    ctx.fillRect(-s*0.5, -s,     s, s*2);      // tronco vertical
    ctx.fillRect(-s,     -s*0.3, s*2, s*0.6);  // ancho central
    ctx.fillRect(-s*0.7, -s*0.7, s*1.4, s*0.4);
    ctx.fillRect(-s*0.7,  s*0.3, s*1.4, s*0.4);
    ctx.restore();
  }

  function tick() {
    if (!active && leaves.length === 0) { clearFx(c); return; }
    raf = requestAnimationFrame(tick);
    const ctx = c.getContext('2d');
    ctx.clearRect(0, 0, c.width, c.height);

    if (active && Math.random() < 0.18) spawnLeaf();

    for (let i = leaves.length - 1; i >= 0; i--) {
      const l = leaves[i];
      l.sway += l.swayS;
      l.x  += l.vx + Math.sin(l.sway) * 0.6;
      l.y  += l.vy;
      l.rot += l.vrot;
      if (l.y > c.height + 10) { leaves.splice(i, 1); continue; }
      drawLeaf(ctx, l.x, l.y, l.size, l.rot, l.color);
    }
  }

  function clearFx(cv) { cv.getContext('2d').clearRect(0, 0, cv.width, cv.height); }

  wrap.addEventListener('mouseenter', () => {
    syncFx('fx-game');
    active = true;
    if (!raf) tick();
  });
  wrap.addEventListener('mouseleave', () => {
    active = false;
    raf = null;
  });
})();

/* ══════════════════════════════
   FANART — píxeles emanantes tipo explosión de color
══════════════════════════════ */
(function() {
  const wrap = document.getElementById('win-vid');
  const c    = document.getElementById('fx-vid');
  if (!wrap || !c) return;

  const pixels = [];
  let active = false, raf = null, mx = 0, my = 0;

  const PX_COLORS = [
    '#e87050','#d4605a','#c45090','#9850c4',
    '#5070d4','#50b4c4','#50c490','#c4b450',
  ];

  function spawnBurst(x, y, n) {
    for (let i = 0; i < n; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 0.5 + Math.random() * 2.5;
      pixels.push({
        x, y,
        size: 2 + Math.floor(Math.random() * 4),
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 0,
        maxL: 40 + Math.random() * 50,
        color: PX_COLORS[Math.floor(Math.random() * PX_COLORS.length)],
      });
    }
  }

  function tick() {
    if (!active && pixels.length === 0) { clearFx(c); return; }
    raf = requestAnimationFrame(tick);
    const ctx = c.getContext('2d');
    ctx.clearRect(0, 0, c.width, c.height);

    // emisión continua desde posición del mouse
    if (active && Math.random() < 0.6) spawnBurst(mx, my, 2);

    for (let i = pixels.length - 1; i >= 0; i--) {
      const p = pixels[i];
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.04; // gravedad leve
      p.life++;
      if (p.life > p.maxL) { pixels.splice(i, 1); continue; }
      const t = p.life / p.maxL;
      const alpha = t < 0.2 ? t / 0.2 : 1 - (t - 0.2) / 0.8;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.fillRect(Math.round(p.x), Math.round(p.y), p.size, p.size);
    }
    ctx.globalAlpha = 1;
  }

  function clearFx(cv) { cv.getContext('2d').clearRect(0, 0, cv.width, cv.height); pixels.length = 0; }

  wrap.addEventListener('mouseenter', e => {
    syncFx('fx-vid');
    const r = c.getBoundingClientRect();
    mx = e.clientX - r.left; my = e.clientY - r.top;
    active = true;
    spawnBurst(mx, my, 12); // burst inicial
    if (!raf) tick();
  });
  wrap.addEventListener('mousemove', e => {
    const r = c.getBoundingClientRect();
    mx = e.clientX - r.left; my = e.clientY - r.top;
  });
  wrap.addEventListener('mouseleave', () => {
    active = false;
    raf = null;
  });
})();

/* ══════════════════════════════
   VARIOS — scratches animados del film strip
   (el overlay CSS ya pone los bordes de película;

══════════════════════════════ */
(function() {
  const wrap  = document.getElementById('win-anim');
  const strip = document.getElementById('film-strip');
  if (!wrap || !strip) return;

  const scratches = [];
  let active = false;

  function spawnScratch() {
    const el = document.createElement('div');
    el.className = 'scratch';
    const H = wrap.querySelector('.win-screen').offsetHeight || 300;
    const top  = Math.random() * H * 0.8;
    const h    = 20 + Math.random() * 80;
    const left = 28 + Math.random() * (wrap.offsetWidth - 56);
    el.style.top    = top + 'px';
    el.style.height = h + 'px';
    el.style.left   = left + 'px';
    strip.appendChild(el);
    scratches.push(el);
    // quitar después de un tiempo aleatorio
    setTimeout(() => {
      el.remove();
      const idx = scratches.indexOf(el);
      if (idx > -1) scratches.splice(idx, 1);
    }, 100 + Math.random() * 400);
  }

  let interval = null;
  wrap.addEventListener('mouseenter', () => {
    active = true;
    spawnScratch();
    interval = setInterval(() => {
      if (!active) return;
      if (Math.random() < 0.5) spawnScratch();
    }, 120);
  });
  wrap.addEventListener('mouseleave', () => {
    active = false;
    clearInterval(interval);
    interval = null;
    scratches.forEach(s => s.remove());
    scratches.length = 0;
  });
})();

  if (moralisFxInited) return;
  moralisFxInited = true;
  const wrap = document.getElementById('win-moralis');
  const c    = document.getElementById('fx-moralis');
  if (!wrap || !c) return;

  const pts=[]; let active=false, raf=null;
  const NEON=['#00c8ff','#00ff88','#ff00aa','#00ffff'];

  function spawn() {
    const W=c.width, H=c.height;
    const angle=Math.random()*Math.PI*2, speed=0.4+Math.random()*1.5;
    pts.push({
      x:W*0.5+(Math.random()-0.5)*W*0.6,
      y:H*0.5+(Math.random()-0.5)*H*0.6,
      vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed,
      size:1+Math.random()*2.5,
      life:0, maxL:50+Math.random()*50,
      color:NEON[Math.floor(Math.random()*NEON.length)],
    });
  }
  function tick() {
    if(!active && pts.length===0){c.getContext('2d').clearRect(0,0,c.width,c.height);return;}
    raf=requestAnimationFrame(tick);
    const ctx=c.getContext('2d'); ctx.clearRect(0,0,c.width,c.height);
    if(active && Math.random()<0.4) spawn();
    for(let i=pts.length-1;i>=0;i--) {
      const p=pts[i]; p.x+=p.vx; p.y+=p.vy; p.life++;
      if(p.life>p.maxL){pts.splice(i,1);continue;}
      const a=(1-p.life/p.maxL)*0.85;
      ctx.globalAlpha=a; ctx.fillStyle=p.color;
      ctx.fillRect(Math.round(p.x),Math.round(p.y),p.size,p.size);
    }
    ctx.globalAlpha=1;
  }
  wrap.addEventListener('mouseenter',()=>{syncFx('fx-moralis');active=true;if(!raf)tick();});
  wrap.addEventListener('mouseleave',()=>{active=false;raf=null;pts.length=0;});
}
</script>
</body>
</html>
